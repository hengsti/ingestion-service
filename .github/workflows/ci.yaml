name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

concurrency:
  group: ci-ingestion-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test Rust project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust 1.87.0
        uses: dtolnay/rust-toolchain@1.87.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.8.1

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit
        # RUSTSEC-2026-0049 and RUSTSEC-2025-0134 are suppressed: both are pulled in by
        # rumqttc 0.25.1 (latest) which has not yet migrated to rustls-webpki >= 0.103.10.
        # Risk is low as MQTT runs on plaintext in this deployment (no TLS CRL validation).
        run: cargo audit --ignore RUSTSEC-2026-0049 --ignore RUSTSEC-2025-0134
