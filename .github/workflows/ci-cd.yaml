name: ingestion-service-ci-cd

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ingestion-service-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ingestion-service
  DEPLOY_PATH: /opt/smarthome-stack
  SERVICE_NAME: ingest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test Rust project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.8.1

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --all-features --locked

  build_and_push:
  name: Build and push Docker image
  needs: test
  if: github.event_name == 'push'
  runs-on: [self-hosted, linux, ARM64, smarthome]
  outputs:
    image_tag: ${{ steps.vars.outputs.image_tag }}

  steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Compute image tag
      id: vars
      shell: bash
      run: echo "image_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push ARM64 image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        platforms: linux/arm64
        tags: |
          ${{ env.IMAGE_NAME }}:master
          ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}
        labels: |
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}

  deploy:
  name: Deploy ingest service
  needs: build_and_push
  if: github.event_name == 'push'
  runs-on: [self-hosted, linux, ARM64, smarthome]
  permissions:
    contents: read
    packages: read

  steps:
    - name: Log in to GHCR
      shell: bash
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
          --username "${{ github.repository_owner }}" \
          --password-stdin

    - name: Update deploy tag
      working-directory: /opt/smarthome-stack
      env:
        IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
      shell: bash
      run: |
        if grep -q '^INGEST_TAG=' .env; then
          sed -i "s/^INGEST_TAG=.*/INGEST_TAG=${IMAGE_TAG}/" .env
        else
          echo "INGEST_TAG=${IMAGE_TAG}" >> .env
        fi

    - name: Pull new image
      working-directory: /opt/smarthome-stack
      run: docker compose pull ingest

    - name: Recreate ingest only
      working-directory: /opt/smarthome-stack
      run: docker compose up -d --no-deps ingest

    - name: Prune dangling images
      run: docker image prune -f